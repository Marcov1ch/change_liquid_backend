[flake8]
max-line-length = 110

per-file-ignores =
    src/app/common/messages.py: E501
    src/app/common/liquid_config.py: E501
    src/app/services/replacement_service.py: E501
    src/app/common/utils/calculator.py: E501
    src/app/api/vehicle/handler.py: E501

[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True
check_untyped_defs = True
disallow_untyped_defs = True
explicit_package_bases = True
namespace_packages = True

[mypy-app.*]
ignore_missing_imports = True
follow_imports = silent

[mypy-app.services.*]
check_untyped_defs = True