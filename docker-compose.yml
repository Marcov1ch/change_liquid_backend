services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/app.db
      - SECRET_KEY=${SECRET_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - FRONTEND_URL=${FRONTEND_URL}
    restart: always
    deploy:
      resources:
        limits:
          memory: 150M

  frontend:
    build: ../change_liquid_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
    deploy:
      resources:
        limits:
          memory: 50M
