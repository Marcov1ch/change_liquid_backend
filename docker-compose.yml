services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - DATABASE_PATH=/data/app.db
      - SECRET_KEY=${SECRET_KEY}
    restart: always

  frontend:
    build: ../car-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
